server {
    listen 80;
    server_name sg-portal.nirix.online;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # n8n proxy — Fleet Board Save
    location /api/fleet-save/ {
        proxy_pass https://abnv5.app.n8n.cloud/webhook/fleet-board-save/;
        proxy_ssl_server_name on;
        proxy_set_header Host abnv5.app.n8n.cloud;
        proxy_set_header Content-Type application/json;
    }

    # n8n proxy — Fleet Board Load
    location /api/fleet-load/ {
        proxy_pass https://abnv5.app.n8n.cloud/webhook/fleet-board-load/;
        proxy_ssl_server_name on;
        proxy_set_header Host abnv5.app.n8n.cloud;
        proxy_set_header Content-Type application/json;
    }

    # n8n proxy — Boat Tech Specs
    location /api/boat-specs/ {
        proxy_pass https://abnv5.app.n8n.cloud/webhook/boat-specs/;
        proxy_ssl_server_name on;
        proxy_set_header Host abnv5.app.n8n.cloud;
        proxy_set_header Content-Type application/json;
    }

    # n8n proxy — Daily Machinery Report
    location /api/daily-report/ {
        proxy_pass https://abnv5.app.n8n.cloud/webhook/daily-machinery-report/;
        proxy_ssl_server_name on;
        proxy_set_header Host abnv5.app.n8n.cloud;
        proxy_set_header Content-Type application/json;
    }

    # n8n proxy — Photo Upload
    location /api/photo-upload/ {
        proxy_pass https://abnv5.app.n8n.cloud/webhook/photo-upload/;
        proxy_ssl_server_name on;
        proxy_set_header Host abnv5.app.n8n.cloud;
        proxy_set_header Content-Type application/json;
    }
}
