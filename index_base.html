.sp-tab-content { padding:16px; }

}

    let _fbAuth = null;

    function initFirebase() {
      if (typeof firebase === 'undefined') return;
      try {
        if (!firebase.apps || !firebase.apps.length) {
          firebase.initializeApp(FIREBASE_CONFIG);
        }
        _fbAuth = firebase.auth();
        _fbDb   = firebase.firestore();
      } catch (e) {
        console.error('Firebase init failed', e);
      }
    }

    async function handleLogin() {
      if (!_fbAuth) { checkLogin(); return; }
      const email = (document.getElementById('login-email').value || '').trim();
      const pass  = document.getElementById('login-pass').value || '';
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      if (!email || !pass) { errEl.textContent = 'Please enter your email and password.'; return; }
      try {
        const cred = await _fbAuth.signInWithEmailAndPassword(email, pass);
        const uid  = cred.user.uid;
        const snap = await _fbDb.collection('users').doc(uid).get();
        if (!snap.exists || !snap.data().role) {
          await _fbAuth.signOut();
          errEl.textContent = 'Access denied. Contact your administrator.';
          return;
        }
        const data = snap.data();
        if (data.blocked) {
          await _fbAuth.signOut();
          errEl.textContent = 'Your account has been suspended. Contact your administrator.';
          return;
        }
        const exNorm = Object.assign({}, data.extraPermissions || {});
        if (exNorm.upload === true && exNorm.uploadCert == null) exNorm.uploadCert = true;
        if (exNorm.upload === false && exNorm.uploadCert == null) exNorm.uploadCert = false;
        initPermissions(data.role, exNorm,
          cred.user.email, cred.user.uid);
        applyRoleGating();
        await loadSessionSettings();
        await logActivity('login', 'Dashboard login');
        startInactivityTimer();
        showDashboard();
      } catch (err) {
        if (err.code === 'auth/user-disabled') {
          errEl.textContent = 'Your account has been suspended. Contact your administrator.';
        } else {
          errEl.textContent = 'Incorrect email or password.';
        }
      }
    }

    function showLoginError(msg) {
      const el = document.getElementById('login-error');
      if (el) el.textContent = msg;
    }

    async function handleSignOut() {
      try { await logActivity('logout', 'Manual sign out'); } catch (e) {}
      stopInactivityTimer();
      if (_fbAuth) await _fbAuth.signOut();
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = null;
      showLogin();
    }

    function applyRoleGating() {
      // Reset gated controls so re-apply after dynamic cert re-renders is correct
      document.querySelectorAll('.cert-del-btn').forEach(el => { el.style.display = ''; });
      document.querySelectorAll('.cert-upload-btn').forEach(el => { el.style.display = ''; });

      document.querySelectorAll('.cert-add-btn').forEach(el => { el.style.display = ''; });
      document.querySelectorAll('.cert-ei').forEach(el => {
        el.readOnly = false;
        el.style.pointerEvents = '';
        el.style.opacity = '';
      });
      // Cert delete buttons
      if (!can.deleteCert()) {
        document.querySelectorAll('.cert-del-btn').forEach(el => el.style.display = 'none');
      }
      // Cert upload buttons
      if (!can.uploadCert()) {
        document.querySelectorAll('.cert-upload-btn').forEach(el => el.style.display = 'none');
      }
      // Cert name inputs — make read-only if no edit permission
      if (!can.editCertName()) {
        document.querySelectorAll('.cert-ei:not(.cert-ei-date):not(.cert-ei-win)').forEach(el => {
          el.readOnly = true;
          el.style.pointerEvents = 'none';
          el.style.opacity = '0.6';

      if (!can.editExpiry()) {
        document.querySelectorAll('.cert-ei-date').forEach(el => {

          el.style.opacity = '0.6';

          el.style.pointerEvents = 'none';
          el.style.opacity = '0.6';
